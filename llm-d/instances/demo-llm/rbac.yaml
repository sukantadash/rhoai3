apiVersion: v1
kind: ServiceAccount
metadata:
  name: test-user
  namespace: demo-llm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llm-inferenceservice-reader
  namespace: demo-llm
rules:
  - apiGroups: ["serving.kserve.io"]
    resources: ["llminferenceservices"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-inferenceservice-reader-binding
  namespace: demo-llm
subjects:
  - kind: ServiceAccount
    name: test-user
    namespace: demo-llm
roleRef:
  kind: Role
  name: llm-inferenceservice-reader
  apiGroup: rbac.authorization.k8s.io
