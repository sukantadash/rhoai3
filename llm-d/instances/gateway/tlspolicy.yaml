# Update issuerRef.name to match your existing ClusterIssuer (oc get clusterissuer).
apiVersion: kuadrant.io/v1
kind: TLSPolicy
metadata:
  name: openshift-ai-inference-tls
  namespace: openshift-ingress
spec:
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-production-ec2
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: openshift-ai-inference
