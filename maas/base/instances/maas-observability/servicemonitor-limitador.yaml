# DEPRECATED — not used by the MaaS Usage dashboard.
#
# The Usage tab queries cluster Thanos (openshift-monitoring), not RHOAI Prometheus.
# Metrics flow: Limitador → Kuadrant observability PodMonitor → User Workload
# Monitoring → thanos-querier.openshift-monitoring.
#
# Use instead:
#   - base/instances/uwm/cluster-monitoring-config.yaml  (enableUserWorkload: true)
#   - base/instances/rhcl/kuadrant.yaml                  (observability.enable: true)
#
# This file is retained for reference only. It is NOT included in kustomization.yaml.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: limitador-metrics
  namespace: redhat-ods-monitoring
  labels:
    app: limitador
    app.kubernetes.io/part-of: maas-observability
spec:
  namespaceSelector:
    matchNames:
      - rh-connectivity-link
  selector:
    matchLabels:
      app: limitador
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
