apiVersion: kuadrant.io/v1beta1
kind: Kuadrant
metadata:
  name: kuadrant
  namespace: kuadrant-system
spec:
  # Creates Limitador/Authorino PodMonitors scraped by User Workload Monitoring.
  # Required for MaaS Usage dashboard (with UWM enabled via base/instances/uwm/).
  observability:
    enable: true