# UPDATE BEFORE APPLY (llm-d cluster), e.g. in maas-script.sh overlay 13:
#   DOMAIN=$(oc get ingresses.config cluster -o jsonpath='{.spec.domain}')
#   PROXY_HOST="qwen-maas.${DOMAIN}"
#
# Replace placeholder below:
#   <cluster-domain>  → ${DOMAIN}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: qwen-maas
  namespace: qwen-maas-proxy
spec:
  host: qwen-maas.apps.<cluster-domain>
  to:
    kind: Service
    name: qwen-maas-proxy
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
