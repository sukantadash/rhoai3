# Upstream credential for llm-d cluster (test-user SA token from demo-llm namespace).
# Do not commit a real token. Create or patch imperatively before apply:
#   oc create secret generic qwen-remote-credentials -n ai-models \
#     --from-literal=api-key="${TEST_TOKEN}" --dry-run=client -o yaml | oc apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: qwen-remote-credentials
  namespace: ai-models
  labels:
    inference.networking.k8s.io/bbr-managed: "true"
type: Opaque
stringData:
  api-key: "REPLACE_ME"
