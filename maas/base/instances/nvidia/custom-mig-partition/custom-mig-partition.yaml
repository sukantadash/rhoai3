kind: ConfigMap
apiVersion: v1
metadata:
  name: custom-mig-partition
  namespace: nvidia-gpu-operator
data:
  config.yaml: |
    version: v1
    mig-configs:
      all-disabled:
        - devices: all
          mig-enabled: false

      custom-mig:
        - devices: [0,1,2]
          mig-enabled: true
          mig-devices:
            "3g.40gb": 2
        - devices: [3,4,5,6,7]
          mig-enabled: false